<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — Satbaria College Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <script>tailwind.config={theme:{extend:{colors:{primary:{600:'#0284c7',700:'#0369a1',800:'#075985',900:'#0c4a6e'},accent:{500:'#f97316'}}}}}</script>
</head>
<body class="bg-gray-100 min-h-screen flex">
<aside class="w-64 bg-gradient-to-b from-primary-800 to-primary-900 min-h-screen flex flex-col shadow-xl fixed left-0 top-0 z-40">
    <div class="px-6 py-5 border-b border-white/10"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-accent-500 rounded-full flex items-center justify-center shadow"><i class="fas fa-graduation-cap text-white text-lg"></i></div><div><p class="text-white font-bold text-sm">Satbaria</p><p class="text-blue-200 text-xs">Degree College</p></div></div></div>
    <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="/admin/dashboard" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-white/10"><i class="fas fa-tachometer-alt w-4"></i> Dashboard</a>
        <p class="text-blue-300 text-xs font-semibold uppercase tracking-wider px-3 mt-3 mb-1">Academics</p>
        <a href="/admin/teachers" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-white/10"><i class="fas fa-chalkboard-teacher w-4"></i> Teachers</a>
        <a href="/admin/staff" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-white/10"><i class="fas fa-users w-4"></i> Staff</a>
        <a href="/admin/student-summary" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-white/10"><i class="fas fa-user-graduate w-4"></i> Student Summary</a>
        <a href="/admin/results" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-white/10"><i class="fas fa-file-alt w-4"></i> Results</a>
        <p class="text-blue-300 text-xs font-semibold uppercase tracking-wider px-3 mt-3 mb-1">Content</p>
        <a href="/admin/notices" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-white/10"><i class="fas fa-bell w-4"></i> Notices</a>
        <a href="/admin/gov-orders" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-white/10"><i class="fas fa-landmark w-4"></i> Gov Orders</a>
        <a href="/admin/gallery" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-white/10"><i class="fas fa-images w-4"></i> Gallery</a>
        <a href="/admin/feedback" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-white/10"><i class="fas fa-envelope w-4"></i> Feedback</a>
        <p class="text-blue-300 text-xs font-semibold uppercase tracking-wider px-3 mt-3 mb-1">System</p>
        <a href="/admin/settings" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium bg-white/20 text-white"><i class="fas fa-cog w-4"></i> Settings</a>
        <a href="/admin/logout" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-red-300 hover:bg-red-500/20"><i class="fas fa-sign-out-alt w-4"></i> Logout</a>
    </nav>
    <div class="px-4 py-3 border-t border-white/10"><div class="flex items-center gap-2"><div class="w-8 h-8 bg-accent-500 rounded-full flex items-center justify-center"><i class="fas fa-user text-white text-xs"></i></div><div><p class="text-white text-xs font-medium">{{.username}}</p><p class="text-blue-300 text-xs">Administrator</p></div></div></div>
</aside>

<main class="ml-64 flex-1 min-h-screen flex flex-col">
    <header class="bg-white shadow-sm px-6 py-4 sticky top-0 z-30">
        <h1 class="text-xl font-bold text-gray-800">College Settings</h1>
    </header>
    <div class="flex-1 p-6 max-w-3xl">
        <div class="bg-white rounded-xl shadow-sm p-6">
            <form method="POST" action="/admin/settings" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">College Name</label>
                        <input type="text" name="name" value="{{.info.Name}}" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Established Year</label>
                        <input type="text" name="est_year" value="{{.info.EstYear}}" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">EIIN Number</label>
                        <input type="text" name="eiin" value="{{.info.EIIN}}" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Address</label>
                        <input type="text" name="address" value="{{.info.Address}}" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Mobile</label>
                        <input type="text" name="mobile" value="{{.info.Mobile}}" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                        <input type="email" name="email" value="{{.info.Email}}" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">About College</label>
                        <textarea name="about" rows="4" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none resize-none">{{.info.About}}</textarea>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">College History</label>
                        <textarea name="history" rows="5" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none resize-none">{{.info.History}}</textarea>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Google Map Embed URL</label>
                        <input type="text" name="map_embed_url" value="{{.info.MapEmbedURL}}" class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none" placeholder="https://maps.google.com/maps?...">
                    </div>
                </div>
                <button type="submit" class="bg-primary-600 hover:bg-primary-700 text-white px-8 py-2.5 rounded-lg text-sm font-medium transition">
                    <i class="fas fa-save mr-2"></i>Save Settings
                </button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
